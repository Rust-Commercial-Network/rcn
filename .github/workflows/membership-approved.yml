name: Add Approved Member to Membership Project Board

on:
  issues:
    types: [closed, labeled]

jobs:
  validate-membership-approval:
    # Run as soon as a maintainer applies the approval label so directory data can
    # be cleaned up before the issue is closed and copied into the project.
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'membership-approved' &&
      contains(toJSON(github.event.issue.labels.*.name), 'membership')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Validate public entity name
        uses: actions/github-script@v7
        with:
          script: |
            const maxEntityLength = 80;
            const body = context.payload.issue.body || '';

            function extractField(body, heading) {
              const sections = body.split(/^###\s*/m);
              for (const section of sections) {
                if (section.startsWith(heading)) {
                  return section.slice(heading.length).trim();
                }
              }
              return '';
            }

            const entityName = extractField(
              body,
              'If you represent a company, institution, consortium, or other entity, please enter it here. If you represent the Rust Project, please enter the Rust Project team.',
            );
            const normalizedEntityName = entityName.trim().toLowerCase();
            let validationError = '';

            if (entityName.length > maxEntityLength) {
              validationError = `the Entity answer is ${entityName.length} characters, which is longer than the ${maxEntityLength} character limit used for the public member directory`;
            } else if (normalizedEntityName === 'company') {
              validationError = 'the Entity answer is `Company`, which is too generic for the public member directory';
            }

            if (!validationError) {
              core.info('Entity name is valid for the public member directory.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `@${context.payload.sender.login}, ${validationError}.`,
                '',
                'Please edit the membership issue body so the Entity answer is the short public directory name, then re-apply `membership-approved`.',
              ].join('\n'),
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'membership-approved',
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              core.info('membership-approved label was already removed.');
            }

            core.setFailed(validationError);

  add-to-project:
    # Only run when the issue is closed by an assignee or repo admin,
    # and has both 'membership' and 'membership-approved' labels
    if: >-
      github.event.action == 'closed' &&
      contains(toJSON(github.event.issue.labels.*.name), 'membership') &&
      contains(toJSON(github.event.issue.labels.*.name), 'membership-approved')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Verify sender is assignee or admin
        id: auth
        uses: actions/github-script@v7
        with:
          script: |
            const sender = context.payload.sender.login;
            const assignees = context.payload.issue.assignees.map(a => a.login);

            // Check if sender is an assignee
            if (assignees.includes(sender)) {
              core.info(`Sender "${sender}" is an assignee. Authorized.`);
              return;
            }

            // Check if sender has admin permission on the repo
            const { data: permData } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: sender,
            });

            if (permData.permission === 'admin') {
              core.info(`Sender "${sender}" is a repo admin. Authorized.`);
              return;
            }

            core.setFailed(`Sender "${sender}" is neither an assignee nor a repo admin. Skipping.`);

      - name: Parse membership issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            // Helper: extract the value under a ### heading.
            // GitHub issue forms render as "### <label>\n\n<value>".
            // Instead of regex-escaping the heading (which has tooling issues),
            // we split on ### boundaries and match by simple string inclusion.
            function extractField(body, heading) {
              const sections = body.split(/^###\s*/m);
              for (const section of sections) {
                if (section.startsWith(heading)) {
                  return section.slice(heading.length).trim();
                }
              }
              return '';
            }

            const name           = extractField(body, 'What is your name?');
            const email          = extractField(body, 'What is your preferred email address?');
            const representation = extractField(body, 'Do you represent a company, the Rust Project, non-profit (e.g. foundation), institution (e.g. academic), consortium, yourself or other entity?');
            const entityName     = extractField(body, 'If you represent a company, institution, consortium, or other entity, please enter it here. If you represent the Rust Project, please enter the Rust Project team.');
            const whyInterested  = extractField(body, 'Why are you interested in joining the RCN?');
            const foundationMember = extractField(body, 'Are you or the entity you represent a Rust Foundation Member?');

            const githubId = context.payload.issue.user.login;
            const githubProfile = `https://github.com/${githubId}`;

            core.setOutput('github_id', githubId);
            core.setOutput('github_profile', githubProfile);
            core.setOutput('name', name);
            core.setOutput('email', email);
            core.setOutput('representation', representation);
            core.setOutput('entity_name', entityName);
            core.setOutput('why_interested', whyInterested);
            core.setOutput('foundation_member', foundationMember);

            core.info(`Parsed — GitHub ID: ${githubId}, Name: ${name}, Email: ${email}, Representation: ${representation}, Entity: ${entityName}`);

      - name: Check public entity name length
        uses: actions/github-script@v7
        env:
          FIELD_ENTITY_NAME: ${{ steps.parse.outputs.entity_name }}
        with:
          script: |
            const maxEntityLength = 80;
            const entityName = process.env.FIELD_ENTITY_NAME || '';
            const normalizedEntityName = entityName.trim().toLowerCase();

            if (entityName.length > maxEntityLength) {
              core.setFailed(`Entity answer is ${entityName.length} characters. Limit is ${maxEntityLength}. Edit the membership issue body before closing.`);
              return;
            }

            if (normalizedEntityName === 'company') {
              core.setFailed('Entity answer is `Company`, which is too generic for the public member directory. Edit the membership issue body before closing.');
              return;
            }

            core.info('Entity name is valid for the public member directory.');

      - name: Add issue to GitHub Project
        id: add-to-project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.MEMBERSHIP_PROJECT_URL }}
          github-token: ${{ secrets.MEMBERSHIP_APPROVAL_PROJECT_TOKEN }}

      - name: Populate project fields
        uses: actions/github-script@v7
        env:
          PROJECT_URL: ${{ vars.MEMBERSHIP_PROJECT_URL }}
          PROJECT_TOKEN: ${{ secrets.MEMBERSHIP_APPROVAL_PROJECT_TOKEN }}
          ITEM_ID: ${{ steps.add-to-project.outputs.itemId }}
          FIELD_GITHUB_ID: ${{ steps.parse.outputs.github_id }}
          FIELD_GITHUB_PROFILE: ${{ steps.parse.outputs.github_profile }}
          FIELD_NAME: ${{ steps.parse.outputs.name }}
          FIELD_EMAIL: ${{ steps.parse.outputs.email }}
          FIELD_REPRESENTATION: ${{ steps.parse.outputs.representation }}
          FIELD_ENTITY_NAME: ${{ steps.parse.outputs.entity_name }}
          FIELD_WHY_INTERESTED: ${{ steps.parse.outputs.why_interested }}
          FIELD_FOUNDATION_MEMBER: ${{ steps.parse.outputs.foundation_member }}
        with:
          github-token: ${{ env.PROJECT_TOKEN }}
          script: |
            // Extract the project number and org from the URL
            // Expected format: https://github.com/orgs/<org>/projects/<number>
            const url = process.env.PROJECT_URL;
            const urlMatch = url.match(/orgs\/([^/]+)\/projects\/(\d+)/);
            if (!urlMatch) {
              core.setFailed(`Could not parse project URL: ${url}`);
              return;
            }
            const orgLogin     = urlMatch[1];
            const projectNumber = parseInt(urlMatch[2], 10);

            // Look up the project's node ID and its fields
            const projectQuery = await github.graphql(`
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2Field {
                          id
                          name
                          dataType
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          dataType
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { org: orgLogin, number: projectNumber });

            const project = projectQuery.organization.projectV2;
            const fields  = project.fields.nodes;

            // Map of field display-name -> value to set
            // Adjust the keys below to match the exact column names in the GitHub Projects board.
            const fieldValues = {
              'GitHub ID':       process.env.FIELD_GITHUB_ID,
              'GitHub Profile':  process.env.FIELD_GITHUB_PROFILE,
              'Name':            process.env.FIELD_NAME,
              'Email':           process.env.FIELD_EMAIL,
              'Representation':  process.env.FIELD_REPRESENTATION,
              'Entity':          process.env.FIELD_ENTITY_NAME,
              'Why Interested':      process.env.FIELD_WHY_INTERESTED,
              'Foundation Member':   process.env.FIELD_FOUNDATION_MEMBER,
            };

            const itemId = process.env.ITEM_ID;

            for (const [displayName, value] of Object.entries(fieldValues)) {
              if (!value) {
                core.info(`Skipping empty field: ${displayName}`);
                continue;
              }

              const field = fields.find(f => f.name === displayName);
              if (!field) {
                core.warning(`Field "${displayName}" not found in project. Skipping. Available fields: ${fields.map(f => f.name).join(', ')}`);
                continue;
              }

              // Single-select fields need the option ID, text fields need the value directly
              if (field.dataType === 'SINGLE_SELECT') {
                const option = field.options.find(o => o.name === value);
                if (!option) {
                  core.warning(`Option "${value}" not found for field "${displayName}". Available: ${field.options.map(o => o.name).join(', ')}`);
                  continue;
                }
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }) {
                      projectV2Item { id }
                    }
                  }
                `, {
                  projectId: project.id,
                  itemId,
                  fieldId: field.id,
                  optionId: option.id,
                });
              } else {
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { text: $value }
                    }) {
                      projectV2Item { id }
                    }
                  }
                `, {
                  projectId: project.id,
                  itemId,
                  fieldId: field.id,
                  value,
                });
              }

              core.info(`Set "${displayName}" = "${value}"`);
            }

            core.info('All fields populated successfully.');

      - name: Mask public email address
        uses: actions/github-script@v7
        env:
          FIELD_EMAIL: ${{ steps.parse.outputs.email }}
        with:
          script: |
            const email = process.env.FIELD_EMAIL || '';

            function maskPart(part) {
              if (part.length === 1) {
                return `${part}∗∗`;
              }
              return `${part[0]}∗∗${part[part.length - 1]}`;
            }

            function maskEmail(email) {
              const atIndex = email.indexOf('@');
              if (atIndex <= 0 || atIndex !== email.lastIndexOf('@') || atIndex === email.length - 1) {
                return email;
              }

              const local = email.slice(0, atIndex);
              const domain = email.slice(atIndex + 1);
              const dotIndex = domain.indexOf('.');

              if (dotIndex <= 0) {
                return `${maskPart(local)}@${maskPart(domain)}`;
              }

              const domainName = domain.slice(0, dotIndex);
              const domainSuffix = domain.slice(dotIndex);
              return `${maskPart(local)}@${maskPart(domainName)}${domainSuffix}`;
            }

            function findFieldValueRange(body, heading) {
              const headingText = `### ${heading}`;
              const headingStart = body.indexOf(headingText);
              if (headingStart === -1) {
                return null;
              }

              const valueStartSearch = headingStart + headingText.length;
              const nextHeadingMatch = /^###\s/m.exec(body.slice(valueStartSearch));
              const sectionEnd = nextHeadingMatch ? valueStartSearch + nextHeadingMatch.index : body.length;
              const sectionValue = body.slice(valueStartSearch, sectionEnd);
              const leadingWhitespace = sectionValue.match(/^\s*/)[0].length;
              const trailingWhitespace = sectionValue.match(/\s*$/)[0].length;

              return {
                start: valueStartSearch + leadingWhitespace,
                end: sectionEnd - trailingWhitespace,
              };
            }

            function replaceFieldValue(body, heading, oldValue, newValue) {
              const range = findFieldValueRange(body, heading);
              if (!range) {
                return null;
              }

              const currentValue = body.slice(range.start, range.end);
              if (currentValue.trim() !== oldValue) {
                return null;
              }

              return `${body.slice(0, range.start)}${newValue}${body.slice(range.end)}`;
            }

            const maskedEmail = maskEmail(email);
            if (!email || maskedEmail === email) {
              core.info('No public email masking update needed.');
              return;
            }

            const updatedBody = replaceFieldValue(
              context.payload.issue.body || '',
              'What is your preferred email address?',
              email,
              maskedEmail,
            );

            if (!updatedBody) {
              core.warning('Could not find the email field in the issue body.');
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: updatedBody,
            });

            core.info('Masked the public email address in the issue body.');
