# https://rust-lang.github.io/mdBook/
# Setup: enable GitHub Pages in repo Settings > Pages > Source: GitHub Actions
name: Deploy mdBook

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.repository == 'Rust-Commercial-Network/rcn' }}
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: "0.4.40"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install mdBook
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RCN_PROJECT_APP_CLIENT_ID }}
          private-key: ${{ secrets.RCN_PROJECT_APP_PRIVATE_KEY }}
          owner: Rust-Commercial-Network
          repositories: rcn
          permission-organization-projects: read
      - name: Generate member list
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          SPONSORS_PROJECT_ORG: Rust-Commercial-Network
          SPONSORS_PROJECT_NUMBER: "1"
        run: node .github/scripts/generate-members.mjs
      - uses: actions/configure-pages@v5
      - run: mdbook build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    if: ${{ github.repository == 'Rust-Commercial-Network/rcn' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
